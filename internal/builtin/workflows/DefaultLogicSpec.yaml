description: "A default logic specification workflow with architect review cycle"
entryNode: "HumanApproval"
exitTransitions:
  - fromNode: "DefaultArchitectReviewer"
    eventType: "ChangesAccepted"
    toNode: "HumanApproval"
nodes:
  - name: "HumanApproval"
    type: "human"
    description: "Human provides requirements or approves the specification"
  - name: "DefaultArchitect"
    type: "agent"
    agentRole: "DefaultArchitect"
    description: "AI architect drafts the logic specification"
  - name: "DefaultArchitectReviewer"
    type: "agent"
    agentRole: "DefaultArchitectReviewer"
    description: "AI reviewer evaluates the drafted specification"
transitions:
  - fromNode: "HumanApproval"
    eventType: "DraftRequested"
    toNode: "DefaultArchitect"
  - fromNode: "DefaultArchitect"
    eventType: "ClarificationNeeded"
    toNode: "HumanApproval"
  - fromNode: "DefaultArchitect"
    eventType: "ReviewNeeded"
    toNode: "DefaultArchitectReviewer"
  - fromNode: "DefaultArchitectReviewer"
    eventType: "ChangesRejected"
    toNode: "DefaultArchitect"
  - fromNode: "DefaultArchitectReviewer"
    eventType: "ChangesAccepted"
    toNode: "HumanApproval"
