description: "A default implementation workflow with code review cycle"
entryNode: "HumanApproval"
exitTransitions:
  - fromNode: "DefaultSwReviewer"
    eventType: "ChangesAccepted"
    toNode: "HumanApproval"
nodes:
  - name: "HumanApproval"
    type: "human"
    description: "Human provides git commit hash"
  - name: "DefaultQaEngineer"
    type: "agent"
    agentRole: "DefaultQaEngineer"
    description: "AI engineer implements the test code"
  - name: "DefaultQaReviewer"
    type: "agent"
    agentRole: "DefaultQaReviewer"
    description: "AI reviewer evaluates the drafted test code"
  - name: "DefaultSwEngineer"
    type: "agent"
    agentRole: "DefaultSwEngineer"
    description: "AI engineer implements the logic code"
  - name: "DefaultSwReviewer"
    type: "agent"
    agentRole: "DefaultSwReviewer"
    description: "AI reviewer evaluates the drafted logic code"
transitions:
  - fromNode: "HumanApproval"
    eventType: "DraftRequested"
    toNode: "DefaultQaEngineer"
  - fromNode: "DefaultQaEngineer"
    eventType: "ReviewNeeded"
    toNode: "DefaultQaReviewer"
  - fromNode: "DefaultQaReviewer"
    eventType: "ChangesRejected"
    toNode: "DefaultQaEngineer"
  - fromNode: "DefaultQaReviewer"
    eventType: "DraftRequested"
    toNode: "DefaultSwEngineer"
  - fromNode: "DefaultSwEngineer"
    eventType: "ReviewNeeded"
    toNode: "DefaultSwReviewer"
  - fromNode: "DefaultSwReviewer"
    eventType: "ChangesRejected"
    toNode: "DefaultSwEngineer"
  - fromNode: "DefaultSwReviewer"
    eventType: "ChangesAccepted"
    toNode: "HumanApproval"
