description: "A default test specification workflow with test review cycle"
entryNode: "HumanApproval"
exitTransitions:
  - fromNode: "DefaultQaSpecReviewer"
    eventType: "ChangesAccepted"
    toNode: "HumanApproval"
nodes:
  - name: "HumanApproval"
    type: "human"
    description: "Human provides git commit hash"
  - name: "DefaultQaAnalyst"
    type: "agent"
    agentRole: "DefaultQaAnalyst"
    description: "AI analyst drafts the test specification"
  - name: "DefaultQaSpecReviewer"
    type: "agent"
    agentRole: "DefaultQaSpecReviewer"
    description: "AI reviewer evaluates the drafted test specification"
transitions:
  - fromNode: "HumanApproval"
    eventType: "DraftRequested"
    toNode: "DefaultQaAnalyst"
  - fromNode: "DefaultQaAnalyst"
    eventType: "ReviewNeeded"
    toNode: "DefaultQaSpecReviewer"
  - fromNode: "DefaultQaSpecReviewer"
    eventType: "ChangesRejected"
    toNode: "DefaultQaAnalyst"
  - fromNode: "DefaultQaSpecReviewer"
    eventType: "ChangesAccepted"
    toNode: "HumanApproval"
