name: "DefaultLogicSpec"
description: "A default logic specification workflow with architect review cycle"
entry_node: "HumanApproval"
exit_transitions:
  - from_node: "DefaultArchitectReviewer"
    event_type: "ChangesAccepted"
    to_node: "HumanApproval"
nodes:
  - name: "HumanApproval"
    type: "human"
    description: "Human provides requirements or approves the specification"
  - name: "DefaultArchitect"
    type: "agent"
    agent_role: "DefaultArchitect"
    description: "AI architect drafts the logic specification"
  - name: "DefaultArchitectReviewer"
    type: "agent"
    agent_role: "DefaultArchitectReviewer"
    description: "AI reviewer evaluates the drafted specification"
transitions:
  - from_node: "HumanApproval"
    event_type: "DraftSpecRequested"
    to_node: "DefaultArchitect"
  - from_node: "DefaultArchitect"
    event_type: "ClarificationNeeded"
    to_node: "HumanApproval"
  - from_node: "DefaultArchitect"
    event_type: "ReviewNeeded"
    to_node: "DefaultArchitectReviewer"
  - from_node: "DefaultArchitectReviewer"
    event_type: "ChangesRejected"
    to_node: "DefaultArchitect"
  - from_node: "DefaultArchitectReviewer"
    event_type: "ChangesAccepted"
    to_node: "HumanApproval"
