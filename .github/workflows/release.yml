name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p "dist/${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w" -o "dist/${GOOS}-${GOARCH}/spectra" ./cmd/spectra
          go build -trimpath -ldflags="-s -w" -o "dist/${GOOS}-${GOARCH}/spectra-agent" ./cmd/spectra_agent
          tar -C "dist/${GOOS}-${GOARCH}" -czf "dist/spectra_${{ steps.version.outputs.value }}_${GOOS}_${GOARCH}.tar.gz" \
            spectra \
            spectra-agent

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  vscode:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      - name: Build VSIX
        working-directory: vscode
        run: |
          npm ci
          npm run compile
          npx @vscode/vsce package --out ../spectra-vscode.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-vscode
          path: spectra-vscode.vsix
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [release, vscode]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find dist -type f -name '*.tar.gz' -exec cp {} release-assets/ \;
          find dist -type f -name '*.vsix' -exec cp {} release-assets/ \;
          (cd release-assets && sha256sum * > checksums.txt)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          generate_release_notes: true
          prerelease: ${{ github.ref_type != 'tag' }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.vsix
            release-assets/checksums.txt
